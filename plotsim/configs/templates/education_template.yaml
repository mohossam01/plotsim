# ═══════════════════════════════════════════════════════
#  plotsim — Education / student cohort analytics
# ═══════════════════════════════════════════════════════

about: "University student academic performance and engagement"
unit: student

# Determinism, light realistic noise, default csv output.
seed: 31337
noise: realistic

window:
  start: 2023-01
  end: 2024-12
  every: monthly


# ── academic-calendar seasonality ───────────────────────
#
#  Engagement / attendance ride the term cycle: lift in
#  Sep-Nov and Feb-Apr, dip in Jun-Aug (summer) and Dec
#  (finals week + winter break). Strengths are signed
#  multipliers added to 1.0 at each named month before
#  per-metric `seasonal_sensitivity` applies.

seasonality:
  - { months: [9, 10, 11], strength: 0.20 }
  - { months: [2, 3, 4], strength: 0.15 }
  - { months: [6, 7, 8], strength: -0.30 }
  - { months: [12], strength: -0.10 }


# ── what we measure ─────────────────────────────────────

metrics:

  - name: assignment_score
    label: Average assignment score
    type: amount
    polarity: positive
    range: [0, 100]

  - name: attendance_rate
    label: Class attendance rate
    type: score
    polarity: positive

  - name: study_hours
    label: Weekly study hours
    type: count
    polarity: positive

  - name: participation
    label: Class participation index
    type: score
    polarity: positive

  - name: dropout_risk
    label: Dropout risk score
    type: score
    polarity: negative

  - name: stress_level
    label: Reported stress index
    type: score
    polarity: negative
    follows: study_hours
    delay: 1


# ── how metrics connect ─────────────────────────────────

connections:
  - attendance_rate driven_by participation
  - assignment_score related attendance_rate
  - participation opposes dropout_risk
  - assignment_score resists dropout_risk
  - stress_level hints_at dropout_risk


# ── who we're simulating ────────────────────────────────

segments:

  - name: high_achievers
    count: 25
    archetype: growth
    label: "Steady academic climb across both years"
    attributes:
      program: [computer_science, engineering]
      year: [sophomore, junior]
    baseline:
      assignment_score: high
      attendance_rate: high
      dropout_risk: low

  - name: late_bloomers
    count: 20
    archetype: flat > growth @ 8
    label: "Struggled the first two terms, then found their footing"
    attributes:
      program: [biology, mathematics, history]
      year: [freshman, sophomore]
    baseline:
      assignment_score: mid
      participation: mid

  - name: early_peakers
    count: 15
    archetype: growth > decline @ 14
    label: "Strong start, fade by senior year"
    attributes:
      program: [business, communications]
      year: [junior, senior]
    baseline:
      assignment_score: high
      attendance_rate: mid

  - name: at_risk
    count: 18
    archetype: decline
    label: "Steady decline — at risk of dropout from term one"
    attributes:
      program: [undeclared, business]
      year: [freshman]
    baseline:
      assignment_score: low
      attendance_rate: low
      dropout_risk: high

  - name: exam_burnout
    count: 10
    archetype: growth > spike_then_crash > flat @ 8 @ 16
    label: "Pushed hard before finals, crashed, never recovered"
    attributes:
      program: [pre_med, engineering]
      year: [junior, senior]
    baseline:
      study_hours: high
      stress_level: high
      dropout_risk: high

  - name: seasonal_engagement
    count: 12
    archetype: seasonal
    label: "Cyclical engagement — strong terms, weak summers"
    attributes:
      program: [arts, music, history]
      year: [sophomore, junior]
    baseline:
      participation: mid
      attendance_rate: mid


# ── lifecycle funnel ────────────────────────────────────

lifecycle:
  track: dropout_risk
  stages:
    - thriving: 0.0
    - stable: 0.15
    - struggling: 0.4
    - critical: 0.7


# ── schema ──────────────────────────────────────────────

dimensions:

  - name: dim_date
    per: period
    columns:
      - {name: date_key,  type: id}
      - {name: date,      type: date}
      - {name: year,      type: int}
      - {name: month,     type: int}
      - {name: quarter,   type: int}

  - name: dim_student
    per: unit
    columns:
      - {name: student_id,    type: id}
      - {name: full_name,     type: faker.name}
      - {name: enroll_year,   type: faker.year}
      - {name: cohort_size,   type: segment.count}
      - name: academic_standing
        type: scd
        tracks: assignment_score
        tiers: [probation, good_standing, deans_list]
        at: [0.4, 0.8]

  - name: dim_course
    reference: true
    columns:
      - {name: course_id,    type: id}
      - {name: course_name,  type: "static.intro_cs,calculus,history,physics,literature,statistics"}
      - {name: credits,      type: "static.3,4,3,4,3,4"}
      - {name: department,   type: "static.computing,math,humanities,sciences,humanities,math"}

  - name: dim_term
    reference: true
    columns:
      - {name: term_id,    type: id}
      - {name: term_name,  type: "static.spring_2023,fall_2023,spring_2024,fall_2024"}
      - {name: term_type,  type: "static.spring,fall,spring,fall"}

facts:

  - name: fct_grades
    metrics: [assignment_score, participation]
    columns:
      - {name: date_key,           type: ref.dim_date}
      - {name: student_id,         type: ref.dim_student}
      - {name: course_id,          type: ref.dim_course}
      - {name: assignment_score,   type: metric.assignment_score}
      - {name: participation,      type: metric.participation}
      - name: grade_band
        type: bucket
        labels: [F, D, C, B, A]

  - name: fct_engagement
    metrics: [attendance_rate, study_hours, stress_level]
    columns:
      - {name: date_key,        type: ref.dim_date}
      - {name: student_id,      type: ref.dim_student}
      - {name: term_id,         type: ref.dim_term}
      - {name: attendance_rate, type: metric.attendance_rate}
      - {name: study_hours,     type: metric.study_hours}
      - {name: stress_level,    type: metric.stress_level}

  - name: fct_risk
    metrics: [dropout_risk]
    columns:
      - {name: date_key,      type: ref.dim_date}
      - {name: student_id,    type: ref.dim_student}
      - {name: dropout_risk,  type: metric.dropout_risk}

events:

  - name: evt_office_hours
    trigger: proportional
    driver: participation
    scale: 3.0
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: student_id,  type: ref.dim_student}
      - {name: event_ts,    type: timestamp}

  - name: evt_dropout
    trigger: threshold
    metric: dropout_risk
    above: 0.65
    for: 2
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: student_id,  type: ref.dim_student}
      - {name: reason,      type: faker.sentence}
      - {name: dropout_flag, type: flag}


# 0.6-M15: data-quality issues for Data Quality Testing (DE L25) and
# Data Cleaning (DE L15). Manifest records every injection so students
# can score detectors against ground truth.
quality:
  - { table: fct_grades,     issue: null_injection,  rate: 0.03, column: assignment_score }
  - { table: fct_engagement, issue: duplicate_rows,  rate: 0.02 }


# ═══════════════════════════════════════════════════════
#  Legend
# ═══════════════════════════════════════════════════════
#
#  ── unit ───────────────────────────────────────────────
#    company             SaaS / B2B
#    employee            HR / workforce
#    customer            retail / e-commerce
#    campaign            marketing
#    student             academic cohorts
#
#  ── every ──────────────────────────────────────────────
#    monthly             calendar months
#    weekly              calendar weeks
#    daily               calendar days
#
#  ── metric type ────────────────────────────────────────
#    score               bounded [0,1] — attendance, participation
#    amount              bounded business range (requires range)
#    count               integer event counts — study hours, sessions
#    index               signed centered metric (requires range)
#
#  ── polarity ───────────────────────────────────────────
#    positive            higher is better
#    negative            higher is worse
#
#  ── archetype patterns ─────────────────────────────────
#    growth              smooth S-curve rise — high_achievers
#    decline             exponential fade — at_risk
#    seasonal            2 oscillation cycles — term-based engagement
#    flat                low and constant — stalled cohorts
#    spike_then_crash    rapid rise, drop, low plateau — exam burnout
#    accelerating        compound growth — overachievers
#
#  ── archetype composition ──────────────────────────────
#    pattern > pattern   sequential — first then second
#    @ N                 transition at period N
#    flat > growth @ 8
#    growth > spike_then_crash > flat @ 8 @ 16
#
#  ── connections ────────────────────────────────────────
#    mirrors             +0.75  nearly the same signal
#    driven_by           +0.55  strong positive link
#    related             +0.40  moderate positive
#    hints_at            +0.20  weak positive
#    independent          0.00  no relationship
#    hints_against       -0.20  weak inverse
#    resists             -0.40  moderate inverse
#    opposes             -0.55  strong inverse
#    inverts             -0.75  nearly mirror-opposite
#
#  ── baseline ───────────────────────────────────────────
#    high                upper third of metric range
#    mid                 midpoint (default if omitted)
#    low                 lower third of metric range
#
#  ── follows + delay ────────────────────────────────────
#    follows: metric     this metric lags behind another
#    delay: N            by N periods
#
#  ── range ──────────────────────────────────────────────
#    [min, max]          required for amount and index
#                        score defaults to [0, 1]
#                        count has no range
#
#  ── count ──────────────────────────────────────────────
#    1 – 5000            students per segment
#
#  ── schema types ───────────────────────────────────────
#    id                  primary key, auto-generated
#    ref.{table}         foreign key to dim table
#    metric.{name}       populated from named metric
#    faker.{type}        generated via faker (name, year, sentence)
#    static.{value}      fixed value or comma-list for fan-out
#    segment.count       cohort population size
#    timestamp           generated datetime within period
#    flag                boolean derived from event trigger
#    bucket              categorical label derived from trajectory
#    scd                 slowly changing dimension (requires tracks/tiers/at)
#
#  ── event triggers ─────────────────────────────────────
#    proportional        row count = driver metric × scale per period
#    threshold           fires once when metric crosses value for N periods
#
#  ── dimension per ──────────────────────────────────────
#    period              one row per time period (dim_date)
#    unit                one row per entity (dim_student)
#    reference: true     static lookup (dim_course, dim_term)
