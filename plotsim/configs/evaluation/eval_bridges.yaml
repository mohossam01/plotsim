domain:
  name: B2B SaaS customer success
  description: B2B SaaS customer success
  entity_type: company
  entity_label: Companies
time_window:
  start: 2023-01
  end: 2024-12
  granularity: monthly
seed: 42
metrics:
- name: engagement
  label: Product engagement
  distribution: beta
  params:
    alpha: 2.0
    beta: 5.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: mrr
  label: Monthly recurring revenue
  distribution: lognorm
  params:
    s: 0.85
    loc: 0.0
    scale: 25050.0
  polarity: positive
  value_range:
    min: 100.0
    max: 50000.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: support_tickets
  label: Support ticket volume
  distribution: poisson
  params:
    lambda: 5.0
  polarity: negative
  value_range: null
  causal_lag:
    driver: engagement
    lag_periods: 2
    blend_weight: 1.0
  seasonal_sensitivity: 1.0
- name: feature_adoption
  label: Feature adoption rate
  distribution: beta
  params:
    alpha: 2.0
    beta: 5.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: churn_risk
  label: Churn risk score
  distribution: beta
  params:
    alpha: 2.0
    beta: 5.0
  polarity: negative
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: nps
  label: Net promoter score
  distribution: normal
  params:
    mu: 0.0
    sigma: 33.33333333333333
  polarity: positive
  value_range:
    min: -100.0
    max: 100.0
  causal_lag: null
  seasonal_sensitivity: 1.0
archetypes:
- name: promising_client
  label: Strong start, lost champion at month 8, went dormant by 16
  description: Strong start, lost champion at month 8, went dormant by 16
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.5
      steepness: 6.0
      rising: true
    start_pct: 0.0
    end_pct: 0.3333333333333333
  - curve: sigmoid
    params:
      midpoint: 0.3
      steepness: 10.0
      rising: true
    start_pct: 0.3333333333333333
    end_pct: 0.5166666666666666
  - curve: step
    params:
      threshold: 0.5
      before: 1.0
      after: 0.2
    start_pct: 0.5166666666666666
    end_pct: 0.55
  - curve: plateau
    params:
      level: 0.2
    start_pct: 0.55
    end_pct: 0.6666666666666666
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.6666666666666666
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: null
      params: null
      value_range:
        min: 33366.666666666664
        max: 50000.0
    engagement:
      distribution: null
      params: null
      value_range:
        min: 0.6666666666666666
        max: 1.0
- name: steady_enterprise
  label: Reliable accounts, steady climb
  description: Reliable accounts, steady climb
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.5
      steepness: 6.0
      rising: true
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: null
      params: null
      value_range:
        min: 33366.666666666664
        max: 50000.0
    engagement:
      distribution: null
      params: null
      value_range:
        min: 0.6666666666666666
        max: 1.0
- name: slow_churn
  label: Coasted for a year, then quietly faded
  description: Coasted for a year, then quietly faded
  curve_segments:
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.0
    end_pct: 0.5
  - curve: exp_decay
    params:
      rate: 2.0
    start_pct: 0.5
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: null
      params: null
      value_range:
        min: 100.0
        max: 16733.333333333332
    engagement:
      distribution: null
      params: null
      value_range:
        min: 0.0
        max: 0.3333333333333333
- name: seasonal_accounts
  label: Ramped up first 6 months, then settled into quarterly cycles
  description: Ramped up first 6 months, then settled into quarterly cycles
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.5
      steepness: 6.0
      rising: true
    start_pct: 0.0
    end_pct: 0.25
  - curve: oscillating
    params:
      period: 2.0
      amplitude: 0.4
      center: 0.5
    start_pct: 0.25
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: null
      params: null
      value_range:
        min: 16733.333333333332
        max: 33366.666666666664
    engagement:
      distribution: null
      params: null
      value_range:
        min: 0.3333333333333333
        max: 0.6666666666666666
- name: dormant
  label: Signed up, never activated
  description: Signed up, never activated
  curve_segments:
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: null
      params: null
      value_range:
        min: 100.0
        max: 16733.333333333332
    engagement:
      distribution: null
      params: null
      value_range:
        min: 0.0
        max: 0.3333333333333333
- name: turnaround
  label: Declining, hit bottom at month 6, new leadership turned it around at 14
  description: Declining, hit bottom at month 6, new leadership turned it around at
    14
  curve_segments:
  - curve: exp_decay
    params:
      rate: 2.0
    start_pct: 0.0
    end_pct: 0.25
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.25
    end_pct: 0.5833333333333334
  - curve: sigmoid
    params:
      midpoint: 0.5
      steepness: 6.0
      rising: true
    start_pct: 0.5833333333333334
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: null
      params: null
      value_range:
        min: 16733.333333333332
        max: 33366.666666666664
    engagement:
      distribution: null
      params: null
      value_range:
        min: 0.3333333333333333
        max: 0.6666666666666666
