domain:
  name: "E-commerce customer segments"
  description: "Shopper segment behavior across sessions, purchases, and retention"
  entity_type: "customer_segment"
  entity_label: "Customer segments"

time_window:
  start: "2023-01"
  end: "2024-12"
  granularity: "monthly"

seed: 7

metrics:
  - name: "session_count"
    label: "Monthly sessions per segment"
    distribution: "poisson"
    params: {lambda: 8.0}
    polarity: "positive"
  - name: "cart_value"
    label: "Average cart value"
    distribution: "lognorm"
    params: {s: 0.6, loc: 0.0, scale: 80.0}
    polarity: "positive"
    value_range: {min: 0.0, max: 10000.0}
  - name: "conversion_rate"
    label: "Session-to-purchase conversion"
    distribution: "beta"
    params: {alpha: 2.0, beta: 8.0}
    polarity: "positive"
    value_range: {min: 0.0, max: 1.0}
  - name: "return_rate"
    label: "Purchase return rate"
    distribution: "beta"
    params: {alpha: 1.5, beta: 10.0}
    polarity: "negative"
    value_range: {min: 0.0, max: 1.0}
  - name: "loyalty_score"
    label: "Segment loyalty index"
    distribution: "beta"
    params: {alpha: 3.0, beta: 4.0}
    polarity: "positive"
    value_range: {min: 0.0, max: 1.0}

archetypes:
  - name: "holiday_surge"
    label: "Spikes around holidays"
    description: "Cyclical ramps driven by seasonal demand"
    curve_segments:
      - curve: "oscillating"
        params: {period: 0.5, amplitude: 0.35}
        start_pct: 0.0
        end_pct: 1.0
  - name: "steady_growth"
    label: "Builds loyalty over time"
    description: "Sigmoid growth to a sustained plateau"
    curve_segments:
      - curve: "sigmoid"
        params: {midpoint: 0.5, steepness: 5.0}
        start_pct: 0.0
        end_pct: 1.0
  - name: "one_and_done"
    label: "Shops once, then fades"
    description: "Rapid rise, abrupt drop, then dormant"
    curve_segments:
      - curve: "sigmoid"
        params: {midpoint: 0.2, steepness: 12.0}
        start_pct: 0.0
        end_pct: 0.35
      - curve: "step"
        params: {threshold: 0.5, before: 1.0, after: 0.15}
        start_pct: 0.35
        end_pct: 0.5
      - curve: "plateau"
        params: {level: 0.15}
        start_pct: 0.5
        end_pct: 1.0

entities:
  - name: "power_buyers"
    archetype: "steady_growth"
    size: 25
  - name: "holiday_shoppers"
    archetype: "holiday_surge"
    size: 40
  - name: "browsers"
    archetype: "one_and_done"
    size: 15

tables:
  - name: "dim_date"
    type: "dim"
    grain: "per_period"
    columns:
      - {name: "date_key", dtype: "id", source: "pk"}
      - {name: "date", dtype: "date", source: "generated:date_key"}
      - {name: "year", dtype: "int", source: "generated:date_key"}
      - {name: "month", dtype: "int", source: "generated:date_key"}
      - {name: "quarter", dtype: "int", source: "generated:date_key"}
    primary_key: "date_key"

  - name: "dim_customer"
    type: "dim"
    grain: "per_entity"
    columns:
      - {name: "segment_id", dtype: "id", source: "pk"}
      - {name: "segment_name", dtype: "string", source: "generated:faker.company"}
      - {name: "cohort_size", dtype: "int", source: "derived:size"}
    primary_key: "segment_id"

  - name: "dim_product_category"
    type: "dim"
    grain: "per_reference"
    columns:
      - {name: "category_id", dtype: "id", source: "pk"}
      - {name: "category_name", dtype: "string", source: "static:apparel"}
      - {name: "margin_tier", dtype: "string", source: "static:standard"}
    primary_key: "category_id"

  - name: "fct_sessions"
    type: "fact"
    grain: "per_entity_per_period"
    columns:
      - {name: "date_key", dtype: "id", source: "fk:dim_date.date_key"}
      - {name: "segment_id", dtype: "id", source: "fk:dim_customer.segment_id"}
      - {name: "session_count", dtype: "int", source: "metric:session_count"}
      - {name: "conversion_rate", dtype: "float", source: "metric:conversion_rate"}
    primary_key: ["date_key", "segment_id"]
    foreign_keys: ["dim_date.date_key", "dim_customer.segment_id"]

  - name: "fct_purchases"
    type: "fact"
    grain: "per_entity_per_period"
    columns:
      - {name: "date_key", dtype: "id", source: "fk:dim_date.date_key"}
      - {name: "segment_id", dtype: "id", source: "fk:dim_customer.segment_id"}
      - {name: "category_id", dtype: "id", source: "fk:dim_product_category.category_id"}
      - {name: "cart_value", dtype: "float", source: "metric:cart_value"}
      - {name: "return_rate", dtype: "float", source: "metric:return_rate"}
      - {name: "loyalty_score", dtype: "float", source: "metric:loyalty_score"}
    primary_key: ["date_key", "segment_id"]
    foreign_keys:
      - "dim_date.date_key"
      - "dim_customer.segment_id"
      - "dim_product_category.category_id"

  - name: "evt_cart_abandonment"
    type: "event"
    grain: "variable"
    row_count_source: "proportional:return_rate:scale:3"
    columns:
      - {name: "event_id", dtype: "id", source: "pk"}
      - {name: "date_key", dtype: "id", source: "fk:dim_date.date_key"}
      - {name: "segment_id", dtype: "id", source: "fk:dim_customer.segment_id"}
      - {name: "event_ts", dtype: "date", source: "generated:timestamp"}
    primary_key: "event_id"
    foreign_keys: ["dim_date.date_key", "dim_customer.segment_id"]

correlations:
  - {metric_a: "session_count", metric_b: "conversion_rate", coefficient: 0.45}
  - {metric_a: "conversion_rate", metric_b: "loyalty_score", coefficient: 0.40}
  - {metric_a: "return_rate", metric_b: "loyalty_score", coefficient: -0.35}

noise:
  gaussian_sigma: 0.04
  outlier_rate: 0.015
  mcar_rate: 0.01

output:
  format: "csv"
  directory: "out/ecommerce"
