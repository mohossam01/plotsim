# ═══════════════════════════════════════════════════════
#  plotsim — HR / workforce analytics
# ═══════════════════════════════════════════════════════

about: "HR talent and attrition analytics"
unit: employee

window:
  start: 2023-01
  end: 2024-12
  every: monthly


# ── what we measure ─────────────────────────────────────

metrics:

  - name: performance_score
    label: Quarterly performance rating
    type: score
    polarity: positive

  - name: engagement
    label: Pulse engagement index
    type: score
    polarity: positive

  - name: training_hours
    label: Training hours completed
    type: count
    polarity: positive

  - name: absence_rate
    label: Monthly absence rate
    type: score
    polarity: negative
    follows: engagement
    delay: 1

  - name: attrition_risk
    label: Attrition risk score
    type: score
    polarity: negative

  - name: compensation
    label: Total monthly compensation
    type: amount
    polarity: positive
    range: [4000, 25000]


# ── how metrics connect ─────────────────────────────────

connections:
  - engagement driven_by performance_score
  - engagement opposes attrition_risk
  - absence_rate related attrition_risk
  - compensation hints_at performance_score


# ── who we're simulating ────────────────────────────────

segments:

  - name: new_hire_ramp
    count: 20
    archetype: flat > growth @ 6
    label: "Onboarding ramp, then sigmoid into full productivity"
    attributes:
      department: [Engineering, Product]
      level: [IC1, IC2]
    baseline:
      performance_score: mid
      engagement: mid
      training_hours: high

  - name: core_team
    count: 30
    archetype: flat
    label: "Reliable senior contributors at sustained-high baseline"
    attributes:
      department: [Engineering, Sales, Operations]
      level: [senior, lead]
    baseline:
      performance_score: high
      engagement: high
      attrition_risk: low

  - name: fast_riser
    count: 12
    archetype: accelerating
    label: "Compounding performance — promotion track"
    attributes:
      department: [Engineering, Product]
      level: [senior]
    baseline:
      performance_score: high
      compensation: high

  - name: quiet_quitter
    count: 15
    archetype: flat > decline @ 14
    label: "Coasted for a year, then quietly disengaged"
    attributes:
      department: [Sales, Operations]
      level: [IC1, IC2, senior]
    baseline:
      engagement: low
      absence_rate: high
      attrition_risk: high

  - name: burnout_cohort
    count: 8
    archetype: growth > spike_then_crash > flat @ 6 @ 14
    label: "Rapid early ramp, peak around month 6, crashed by 14"
    attributes:
      department: [Engineering, Operations]
      level: [senior, lead]
    baseline:
      performance_score: high
      engagement: mid
      attrition_risk: high

  - name: comeback
    count: 10
    archetype: decline > flat > growth @ 6 @ 14
    label: "Stalled, hit bottom at month 6, recovered with new manager at 14"
    attributes:
      department: [Sales, Product]
      level: [senior]
    baseline:
      performance_score: mid
      engagement: mid


# ── lifecycle funnel ────────────────────────────────────

lifecycle:
  track: attrition_risk
  stages:
    - new_hire: 0.0
    - established: 0.15
    - disengaging: 0.4
    - exited: 0.7


# ── schema ──────────────────────────────────────────────

dimensions:

  - name: dim_date
    per: period
    columns:
      - {name: date_key,  type: id}
      - {name: date,      type: date}
      - {name: year,      type: int}
      - {name: month,     type: int}
      - {name: quarter,   type: int}

  - name: dim_employee
    per: unit
    columns:
      - {name: employee_id,  type: id}
      - {name: full_name,    type: faker.name}
      - {name: hire_year,    type: faker.year}
      - {name: cohort_size,  type: segment.count}
      - name: job_level
        type: scd
        tracks: performance_score
        tiers: [ic, senior, lead]
        at: [0.4, 0.75]

  - name: dim_department
    reference: true
    columns:
      - {name: department_id,  type: id}
      - {name: department,     type: "static.engineering,sales,product,operations"}
      - {name: cost_center,    type: "static.RnD,GTM,RnD,GnA"}

  - name: dim_office
    reference: true
    columns:
      - {name: office_id,  type: id}
      - {name: office,     type: "static.austin,berlin,singapore,remote"}
      - {name: region,     type: "static.AMER,EMEA,APAC,GLOBAL"}

facts:

  - name: fct_performance
    metrics: [performance_score, engagement, training_hours]
    columns:
      - {name: date_key,           type: ref.dim_date}
      - {name: employee_id,        type: ref.dim_employee}
      - {name: department_id,      type: ref.dim_department}
      - {name: performance_score,  type: metric.performance_score}
      - {name: engagement,         type: metric.engagement}
      - {name: training_hours,     type: metric.training_hours}
      - name: review_outcome
        type: bucket
        labels: [improvement_plan, meets, exceeds, top_talent]

  - name: fct_compensation
    metrics: [compensation, attrition_risk]
    columns:
      - {name: date_key,        type: ref.dim_date}
      - {name: employee_id,     type: ref.dim_employee}
      - {name: office_id,       type: ref.dim_office}
      - {name: compensation,    type: metric.compensation}
      - {name: attrition_risk,  type: metric.attrition_risk}

  - name: fct_attendance
    metrics: [absence_rate]
    columns:
      - {name: date_key,     type: ref.dim_date}
      - {name: employee_id,  type: ref.dim_employee}
      - {name: absence_rate, type: metric.absence_rate}

events:

  - name: evt_training_completion
    trigger: proportional
    driver: engagement
    scale: 4.0
    columns:
      - {name: event_id,      type: id}
      - {name: date_key,      type: ref.dim_date}
      - {name: employee_id,   type: ref.dim_employee}
      - {name: course_name,   type: faker.word}
      - {name: event_ts,      type: timestamp}

  - name: evt_attrition
    trigger: threshold
    metric: attrition_risk
    above: 0.7
    for: 3
    columns:
      - {name: event_id,     type: id}
      - {name: date_key,     type: ref.dim_date}
      - {name: employee_id,  type: ref.dim_employee}
      - {name: reason,       type: faker.sentence}
      - {name: voluntary,    type: flag}


# ═══════════════════════════════════════════════════════
#  Legend
# ═══════════════════════════════════════════════════════
#
#  ── unit ───────────────────────────────────────────────
#    company             SaaS / B2B
#    employee            HR / workforce
#    customer            retail / e-commerce
#    campaign            marketing
#    (any word)          dim table becomes dim_{unit}
#
#  ── every ──────────────────────────────────────────────
#    monthly             calendar months
#    weekly              calendar weeks
#    daily               calendar days
#
#  ── metric type ────────────────────────────────────────
#    score               bounded [0,1] — performance, engagement, risk
#    amount              bounded business range (requires range)
#    count               integer event counts — training hours, absences
#    index               signed centered metric (requires range)
#
#  ── polarity ───────────────────────────────────────────
#    positive            higher is better
#    negative            higher is worse
#
#  ── archetype patterns ─────────────────────────────────
#    growth              smooth S-curve rise — new-hire ramp
#    decline             exponential fade — disengagement
#    seasonal            2 oscillation cycles — cyclical roles
#    flat                low and constant — coasting baseline
#    spike_then_crash    rapid rise, drop, low plateau — burnout
#    accelerating        compound growth — promotion track
#
#  ── archetype composition ──────────────────────────────
#    pattern > pattern   sequential — first then second
#    @ N                 transition at period N
#    flat > growth @ 6
#    growth > spike_then_crash > flat @ 6 @ 14
#
#  ── connections ────────────────────────────────────────
#    mirrors             +0.75  nearly the same signal
#    driven_by           +0.55  strong positive link
#    related             +0.40  moderate positive
#    hints_at            +0.20  weak positive
#    independent          0.00  no relationship
#    hints_against       -0.20  weak inverse
#    resists             -0.40  moderate inverse
#    opposes             -0.55  strong inverse
#    inverts             -0.75  nearly mirror-opposite
#
#  ── baseline ───────────────────────────────────────────
#    high                upper third of metric range
#    mid                 midpoint (default if omitted)
#    low                 lower third of metric range
#
#  ── follows + delay ────────────────────────────────────
#    follows: metric     this metric lags behind another
#    delay: N            by N periods
#
#  ── range ──────────────────────────────────────────────
#    [min, max]          required for amount and index
#                        score defaults to [0, 1]
#                        count has no range
#
#  ── count ──────────────────────────────────────────────
#    1 – 5000            employees per segment
#
#  ── schema types ───────────────────────────────────────
#    id                  primary key, auto-generated
#    ref.{table}         foreign key to dim table
#    metric.{name}       populated from named metric
#    faker.{type}        generated via faker (name, year, sentence, word)
#    static.{value}      fixed value or comma-list for fan-out
#    segment.count       cohort population size
#    timestamp           generated datetime within period
#    flag                boolean derived from event trigger
#    bucket              categorical label derived from trajectory
#    scd                 slowly changing dimension (requires tracks/tiers/at)
#
#  ── event triggers ─────────────────────────────────────
#    proportional        row count = driver metric × scale per period
#    threshold           fires once when metric crosses value for N periods
#
#  ── dimension per ──────────────────────────────────────
#    period              one row per time period (dim_date)
#    unit                one row per entity (dim_employee)
#    reference: true     static lookup (dim_department, dim_office)
