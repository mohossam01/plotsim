# ═══════════════════════════════════════════════════════
#  plotsim — Marketing campaign analytics
# ═══════════════════════════════════════════════════════

about: "Marketing campaign performance — spend, reach, conversion, revenue"
unit: campaign

# Determinism + slightly-messy noise to mimic ad-platform jitter.
seed: 80211
noise: slightly_messy

window:
  start: 2023-01
  end: 2024-12
  every: monthly


# ── what we measure ─────────────────────────────────────

metrics:

  - name: ad_spend
    label: Monthly paid-media spend
    type: amount
    polarity: positive
    range: [500, 50000]

  - name: impressions
    label: Ad impressions delivered
    type: count
    polarity: positive

  - name: click_through_rate
    label: Ad click-through rate
    type: score
    polarity: positive

  - name: conversion_rate
    label: Visit-to-purchase conversion
    type: score
    polarity: positive

  - name: bounce_rate
    label: Landing-page bounce rate
    type: score
    polarity: negative

  - name: revenue
    label: Attributed revenue
    type: amount
    polarity: positive
    range: [0, 250000]

  - name: roi
    label: Return on ad spend
    type: index
    polarity: positive
    range: [-1, 5]

  - name: leads_generated
    label: Marketing-qualified leads
    type: count
    polarity: positive
    follows: impressions
    delay: 1


# ── how metrics connect ─────────────────────────────────

# Numeric coefficients calibrated from a real ad-platform dataset.
# Mix of vocabulary words and explicit r values — both forms
# coexist; the engine treats them as a single correlation matrix.
connections:
  - click_through_rate driven_by impressions
  - conversion_rate driven_by click_through_rate
  - bounce_rate opposes conversion_rate
  - "revenue 0.62 conversion_rate"             # measured r=0.62
  - [roi, 0.48, revenue]                        # measured r=0.48
  - leads_generated related click_through_rate


# ── who we're simulating ────────────────────────────────

segments:

  - name: awareness_builder
    count: 15
    archetype: growth
    label: "Top-of-funnel brand awareness — steady reach growth"
    attributes:
      objective: [awareness]
      channel: [paid_social, display]
    baseline:
      impressions: high
      ad_spend: high
      conversion_rate: low

  - name: paid_burst
    count: 18
    archetype: growth > spike_then_crash @ 12
    label: "Heavy paid push, then sharp budget cut after Q4"
    attributes:
      objective: [conversion]
      channel: [paid_search, paid_social]
    baseline:
      ad_spend: high
      impressions: high
      bounce_rate: high

  - name: seasonal_promo
    count: 20
    archetype: seasonal
    label: "Cyclical holiday and seasonal-sale pushes"
    attributes:
      objective: [conversion, awareness]
      channel: [paid_search, email, paid_social]
    baseline:
      ad_spend: mid
      revenue: mid

  - name: delayed_breakthrough
    count: 12
    archetype: flat > growth @ 10
    label: "Quiet ramp-up, breakthrough mid-campaign once creative landed"
    attributes:
      objective: [conversion]
      channel: [paid_search, display]
    baseline:
      ad_spend: mid
      conversion_rate: mid

  - name: viral_compound
    count: 10
    archetype: accelerating
    label: "Compounding organic share — viral coefficient > 1"
    attributes:
      objective: [awareness, engagement]
      channel: [organic_social, referral]
    baseline:
      impressions: high
      revenue: high
      roi: high

  - name: end_of_life
    count: 8
    archetype: decline
    label: "Sunsetting campaign — winding down spend over the window"
    attributes:
      objective: [retention]
      channel: [email, retargeting]
    baseline:
      ad_spend: low
      conversion_rate: low

  - name: retarget_revival
    count: 10
    archetype: decline > flat > growth @ 6 @ 16
    label: "Stalled, paused, then relaunched with retargeting bump"
    attributes:
      objective: [retention, conversion]
      channel: [retargeting, email]
    baseline:
      conversion_rate: mid
      bounce_rate: mid


# ── lifecycle funnel ────────────────────────────────────

lifecycle:
  track: conversion_rate
  stages:
    - launch: 0.0
    - ramping: 0.15
    - performing: 0.4
    - winning: 0.7


# ── schema ──────────────────────────────────────────────

dimensions:

  - name: dim_date
    per: period
    columns:
      - {name: date_key,  type: id}
      - {name: date,      type: date}
      - {name: year,      type: int}
      - {name: month,     type: int}
      - {name: quarter,   type: int}

  - name: dim_campaign
    per: unit
    columns:
      - {name: campaign_id,    type: id}
      - {name: campaign_name,  type: faker.company}
      - {name: launch_year,    type: faker.year}
      - {name: cohort_size,    type: segment.count}
      - name: campaign_phase
        type: scd
        tracks: revenue
        tiers: [seed, scale, mature]
        at: [0.3, 0.7]

  - name: dim_channel
    reference: true
    columns:
      - {name: channel_id,    type: id}
      - {name: channel_name,  type: "static.paid_search,paid_social,display,email,organic_social,referral,retargeting"}
      - {name: channel_type,  type: "static.paid,paid,paid,owned,organic,organic,paid"}

  - name: dim_audience
    reference: true
    columns:
      - {name: audience_id,    type: id}
      - {name: audience_name,  type: "static.lookalike,prospecting,retargeting,loyalty,broad"}
      - {name: audience_size,  type: "static.large,large,medium,small,large"}

  - name: dim_creative
    reference: true
    columns:
      - {name: creative_id,    type: id}
      - {name: format,         type: "static.video,static_image,carousel,story,native"}
      - {name: variant,        type: "static.A,A,B,C,B"}

facts:

  - name: fct_spend
    metrics: [ad_spend, impressions, click_through_rate]
    columns:
      - {name: date_key,            type: ref.dim_date}
      - {name: campaign_id,         type: ref.dim_campaign}
      - {name: channel_id,          type: ref.dim_channel}
      - {name: creative_id,         type: ref.dim_creative}
      - {name: ad_spend,            type: metric.ad_spend}
      - {name: impressions,         type: metric.impressions}
      - {name: click_through_rate,  type: metric.click_through_rate}

  - name: fct_funnel
    metrics: [conversion_rate, bounce_rate, leads_generated]
    columns:
      - {name: date_key,           type: ref.dim_date}
      - {name: campaign_id,        type: ref.dim_campaign}
      - {name: audience_id,        type: ref.dim_audience}
      - {name: conversion_rate,    type: metric.conversion_rate}
      - {name: bounce_rate,        type: metric.bounce_rate}
      - {name: leads_generated,    type: metric.leads_generated}
      - name: funnel_stage
        type: bucket
        labels: [cold, warming, engaged, converted]

  - name: fct_revenue
    metrics: [revenue, roi]
    columns:
      - {name: date_key,    type: ref.dim_date}
      - {name: campaign_id, type: ref.dim_campaign}
      - {name: revenue,     type: metric.revenue}
      - {name: roi,         type: metric.roi}

events:

  - name: evt_click
    trigger: proportional
    driver: click_through_rate
    scale: 8.0
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: campaign_id, type: ref.dim_campaign}
      - {name: event_ts,    type: timestamp}

  - name: evt_campaign_pause
    trigger: threshold
    metric: conversion_rate
    below: 0.1
    for: 3
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: campaign_id, type: ref.dim_campaign}
      - {name: reason,      type: faker.sentence}
      - {name: pause_flag,  type: flag}


# ═══════════════════════════════════════════════════════
#  Legend
# ═══════════════════════════════════════════════════════
#
#  ── unit ───────────────────────────────────────────────
#    company             SaaS / B2B
#    employee            HR / workforce
#    customer            retail / e-commerce
#    campaign            marketing
#    student             academic cohorts
#
#  ── every ──────────────────────────────────────────────
#    monthly             calendar months
#    weekly              calendar weeks
#    daily               calendar days
#
#  ── metric type ────────────────────────────────────────
#    score               bounded [0,1] — CTR, conversion, bounce
#    amount              bounded business range — spend, revenue
#    count               integer event counts — impressions, leads
#    index               signed centered metric — ROI
#
#  ── polarity ───────────────────────────────────────────
#    positive            higher is better
#    negative            higher is worse
#
#  ── archetype patterns ─────────────────────────────────
#    growth              smooth S-curve rise — awareness build
#    decline             exponential fade — campaign sunset
#    seasonal            2 oscillation cycles — promo cycles
#    flat                low and constant — dormant baseline
#    spike_then_crash    rapid rise, drop, low plateau — paid burst
#    accelerating        compound growth — viral compound
#
#  ── archetype composition ──────────────────────────────
#    pattern > pattern   sequential — first then second
#    @ N                 transition at period N
#    growth > spike_then_crash @ 12
#    flat > growth @ 10
#    decline > flat > growth @ 6 @ 16
#
#  ── connections ────────────────────────────────────────
#    mirrors             +0.75  nearly the same signal
#    driven_by           +0.55  strong positive link
#    related             +0.40  moderate positive
#    hints_at            +0.20  weak positive
#    independent          0.00  no relationship
#    hints_against       -0.20  weak inverse
#    resists             -0.40  moderate inverse
#    opposes             -0.55  strong inverse
#    inverts             -0.75  nearly mirror-opposite
#
#  ── baseline ───────────────────────────────────────────
#    high                upper third of metric range
#    mid                 midpoint (default if omitted)
#    low                 lower third of metric range
#
#  ── follows + delay ────────────────────────────────────
#    follows: metric     this metric lags behind another
#    delay: N            by N periods
#
#  ── range ──────────────────────────────────────────────
#    [min, max]          required for amount and index
#                        score defaults to [0, 1]
#                        count has no range
#
#  ── count ──────────────────────────────────────────────
#    1 – 5000            campaigns per segment
#
#  ── schema types ───────────────────────────────────────
#    id                  primary key, auto-generated
#    ref.{table}         foreign key to dim table
#    metric.{name}       populated from named metric
#    faker.{type}        generated via faker (company, year, sentence)
#    static.{value}      fixed value or comma-list for fan-out
#    segment.count       cohort population size
#    timestamp           generated datetime within period
#    flag                boolean derived from event trigger
#    bucket              categorical label derived from trajectory
#    scd                 slowly changing dimension (requires tracks/tiers/at)
#
#  ── event triggers ─────────────────────────────────────
#    proportional        row count = driver metric × scale per period
#    threshold           fires once when metric crosses value for N periods
#                        (above for risk, below for performance drops)
#
#  ── dimension per ──────────────────────────────────────
#    period              one row per time period (dim_date)
#    unit                one row per entity (dim_campaign)
#    reference: true     static lookup (dim_channel, dim_audience, dim_creative)
