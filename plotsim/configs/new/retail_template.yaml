# ═══════════════════════════════════════════════════════
#  plotsim — Retail / e-commerce customer analytics
# ═══════════════════════════════════════════════════════

about: "Retail customer purchase and loyalty behavior"
unit: customer

window:
  start: 2023-01
  end: 2024-12
  every: monthly


# ── what we measure ─────────────────────────────────────

metrics:

  - name: sessions
    label: Monthly site sessions
    type: count
    polarity: positive

  - name: cart_value
    label: Average cart value
    type: amount
    polarity: positive
    range: [10, 2000]

  - name: conversion_rate
    label: Session-to-purchase conversion
    type: score
    polarity: positive

  - name: return_rate
    label: Purchase return rate
    type: score
    polarity: negative

  - name: loyalty_score
    label: Customer loyalty index
    type: score
    polarity: positive

  - name: repeat_purchase_rate
    label: Repeat purchase rate
    type: score
    polarity: positive
    follows: loyalty_score
    delay: 1

  - name: nps
    label: Net promoter score
    type: index
    polarity: positive
    range: [-100, 100]


# ── how metrics connect ─────────────────────────────────

connections:
  - conversion_rate driven_by loyalty_score
  - cart_value related loyalty_score
  - return_rate opposes loyalty_score
  - repeat_purchase_rate driven_by conversion_rate
  - nps related loyalty_score


# ── who we're simulating ────────────────────────────────

segments:

  - name: loyal_climbers
    count: 25
    archetype: growth
    label: "Builds loyalty steadily across both years"
    attributes:
      tier: [gold, platinum]
      channel: [web, mobile]
    baseline:
      loyalty_score: high
      cart_value: high
      return_rate: low

  - name: holiday_shoppers
    count: 30
    archetype: seasonal
    label: "Cyclical demand around holidays — Q4 surges"
    attributes:
      tier: [silver, gold]
      channel: [web, mobile, marketplace]
    baseline:
      cart_value: mid
      conversion_rate: mid

  - name: cooled_off
    count: 18
    archetype: flat > decline @ 12
    label: "Active first year, gradually disengaged in year two"
    attributes:
      tier: [bronze, silver]
      channel: [marketplace]
    baseline:
      loyalty_score: low
      return_rate: high

  - name: one_and_done
    count: 15
    archetype: growth > spike_then_crash > flat @ 4 @ 8
    label: "Tested the brand for a few months, then never returned"
    attributes:
      tier: [bronze]
      channel: [web]
    baseline:
      loyalty_score: low
      cart_value: low

  - name: winback
    count: 12
    archetype: decline > flat > growth @ 6 @ 14
    label: "Churned, then reactivated by year-two campaign"
    attributes:
      tier: [silver]
      channel: [email, web]
    baseline:
      loyalty_score: mid
      conversion_rate: mid

  - name: escalating_basket
    count: 10
    archetype: accelerating
    label: "Compounding cart values as trust builds"
    attributes:
      tier: [gold, platinum]
      channel: [web]
    baseline:
      cart_value: high
      loyalty_score: high


# ── lifecycle funnel ────────────────────────────────────

lifecycle:
  track: loyalty_score
  stages:
    - new: 0.0
    - casual: 0.2
    - regular: 0.5
    - loyal: 0.75
    - champion: 0.9


# ── schema ──────────────────────────────────────────────

dimensions:

  - name: dim_date
    per: period
    columns:
      - {name: date_key,  type: id}
      - {name: date,      type: date}
      - {name: year,      type: int}
      - {name: month,     type: int}
      - {name: quarter,   type: int}

  - name: dim_customer
    per: unit
    columns:
      - {name: customer_id,    type: id}
      - {name: customer_name,  type: faker.name}
      - {name: signup_year,    type: faker.year}
      - {name: cohort_size,    type: segment.count}
      - name: customer_tier
        type: scd
        tracks: loyalty_score
        tiers: [browser, casual, loyal]
        at: [0.3, 0.7]

  - name: dim_product_category
    reference: true
    columns:
      - {name: category_id,    type: id}
      - {name: category_name,  type: "static.electronics,apparel,home,grocery,beauty"}
      - {name: margin_tier,    type: "static.high,standard,standard,low,high"}

  - name: dim_channel
    reference: true
    columns:
      - {name: channel_id,    type: id}
      - {name: channel_name,  type: "static.web,mobile,marketplace,email,store"}
      - {name: channel_type,  type: "static.digital,digital,third_party,owned,physical"}

  - name: dim_promotion
    reference: true
    columns:
      - {name: promotion_id,    type: id}
      - {name: promo_name,      type: "static.clearance,seasonal_sale,loyalty_reward,flash_sale"}
      - {name: discount_type,   type: "static.percentage,percentage,points,percentage"}

facts:

  - name: fct_sessions
    metrics: [sessions, conversion_rate]
    columns:
      - {name: date_key,         type: ref.dim_date}
      - {name: customer_id,      type: ref.dim_customer}
      - {name: channel_id,       type: ref.dim_channel}
      - {name: session_count,    type: metric.sessions}
      - {name: conversion_rate,  type: metric.conversion_rate}
      - name: shopping_intent
        type: bucket
        labels: [browsing, comparing, purchasing, loyal_repeat]

  - name: fct_purchases
    metrics: [cart_value, return_rate, loyalty_score, repeat_purchase_rate]
    columns:
      - {name: date_key,             type: ref.dim_date}
      - {name: customer_id,          type: ref.dim_customer}
      - {name: category_id,          type: ref.dim_product_category}
      - {name: promotion_id,         type: ref.dim_promotion}
      - {name: cart_value,           type: metric.cart_value}
      - {name: return_rate,          type: metric.return_rate}
      - {name: loyalty_score,        type: metric.loyalty_score}
      - {name: repeat_purchase_rate, type: metric.repeat_purchase_rate}

  - name: fct_satisfaction
    metrics: [nps]
    columns:
      - {name: date_key,    type: ref.dim_date}
      - {name: customer_id, type: ref.dim_customer}
      - {name: nps,         type: metric.nps}

events:

  - name: evt_purchase
    trigger: proportional
    driver: conversion_rate
    scale: 6.0
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: customer_id, type: ref.dim_customer}
      - {name: event_ts,    type: timestamp}

  - name: evt_churn
    trigger: threshold
    metric: loyalty_score
    below: 0.15
    for: 4
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: customer_id, type: ref.dim_customer}
      - {name: reason,      type: faker.sentence}
      - {name: churn_flag,  type: flag}


# ═══════════════════════════════════════════════════════
#  Legend
# ═══════════════════════════════════════════════════════
#
#  ── unit ───────────────────────────────────────────────
#    company             SaaS / B2B
#    employee            HR / workforce
#    customer            retail / e-commerce
#    campaign            marketing
#    student             academic cohorts
#
#  ── every ──────────────────────────────────────────────
#    monthly             calendar months
#    weekly              calendar weeks
#    daily               calendar days
#
#  ── metric type ────────────────────────────────────────
#    score               bounded [0,1] — loyalty, conversion, return
#    amount              bounded business range (requires range)
#    count               integer event counts — sessions, visits
#    index               signed centered metric (requires range) — nps
#
#  ── polarity ───────────────────────────────────────────
#    positive            higher is better
#    negative            higher is worse
#
#  ── archetype patterns ─────────────────────────────────
#    growth              smooth S-curve rise — loyal climbers
#    decline             exponential fade — disengagement
#    seasonal            2 oscillation cycles — holiday shoppers
#    flat                low and constant — dormant customers
#    spike_then_crash    rapid rise, drop, low plateau — one-and-done
#    accelerating        compound growth — escalating basket
#
#  ── archetype composition ──────────────────────────────
#    pattern > pattern   sequential — first then second
#    @ N                 transition at period N
#    flat > decline @ 12
#    growth > spike_then_crash > flat @ 4 @ 8
#    decline > flat > growth @ 6 @ 14
#
#  ── connections ────────────────────────────────────────
#    mirrors             +0.75  nearly the same signal
#    driven_by           +0.55  strong positive link
#    related             +0.40  moderate positive
#    hints_at            +0.20  weak positive
#    independent          0.00  no relationship
#    hints_against       -0.20  weak inverse
#    resists             -0.40  moderate inverse
#    opposes             -0.55  strong inverse
#    inverts             -0.75  nearly mirror-opposite
#
#  ── baseline ───────────────────────────────────────────
#    high                upper third of metric range
#    mid                 midpoint (default if omitted)
#    low                 lower third of metric range
#
#  ── follows + delay ────────────────────────────────────
#    follows: metric     this metric lags behind another
#    delay: N            by N periods
#
#  ── range ──────────────────────────────────────────────
#    [min, max]          required for amount and index
#                        score defaults to [0, 1]
#                        count has no range
#
#  ── count ──────────────────────────────────────────────
#    1 – 5000            customers per segment
#
#  ── schema types ───────────────────────────────────────
#    id                  primary key, auto-generated
#    ref.{table}         foreign key to dim table
#    metric.{name}       populated from named metric
#    faker.{type}        generated via faker (name, year, sentence)
#    static.{value}      fixed value or comma-list for fan-out
#    segment.count       cohort population size
#    timestamp           generated datetime within period
#    flag                boolean derived from event trigger
#    bucket              categorical label derived from trajectory
#    scd                 slowly changing dimension (requires tracks/tiers/at)
#
#  ── event triggers ─────────────────────────────────────
#    proportional        row count = driver metric × scale per period
#    threshold           fires once when metric crosses value for N periods
#                        (above for risk metrics, below for loyalty drops)
#
#  ── dimension per ──────────────────────────────────────
#    period              one row per time period (dim_date)
#    unit                one row per entity (dim_customer)
#    reference: true     static lookup (dim_product_category, dim_channel, dim_promotion)
