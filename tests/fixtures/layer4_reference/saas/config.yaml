domain:
  name: B2B SaaS customer success
  description: Customer account behavior across the subscription lifecycle
  entity_type: customer_account
  entity_label: Customer accounts
time_window:
  start: 2023-01
  end: 2024-12
  granularity: monthly
seed: 42
metrics:
- name: engagement
  label: Product engagement
  distribution: beta
  params:
    alpha: 2.0
    beta: 5.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
- name: mrr
  label: Monthly recurring revenue
  distribution: lognorm
  params:
    s: 0.85
    loc: 0.0
    scale: 1200.0
  polarity: positive
  value_range:
    min: 0.0
    max: 100000.0
  causal_lag: null
- name: support_tickets
  label: Support ticket volume
  distribution: poisson
  params:
    lambda: 5.0
  polarity: negative
  value_range: null
  causal_lag:
    driver: engagement
    lag_periods: 2
- name: feature_adoption
  label: Feature adoption rate
  distribution: beta
  params:
    alpha: 3.0
    beta: 4.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
- name: churn_risk
  label: Churn risk score
  distribution: beta
  params:
    alpha: 2.0
    beta: 5.0
  polarity: negative
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
- name: nps
  label: Net promoter score
  distribution: normal
  params:
    mu: 30.0
    sigma: 15.0
  polarity: positive
  value_range:
    min: -100.0
    max: 100.0
  causal_lag: null
archetypes:
- name: rocket_then_cliff
  label: Grows fast then crashes
  description: Rapid adoption then an abrupt drop and low plateau
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.3
      steepness: 10.0
    start_pct: 0.0
    end_pct: 0.55
  - curve: step
    params:
      threshold: 0.5
      before: 1.0
      after: 0.2
    start_pct: 0.55
    end_pct: 0.65
  - curve: plateau
    params:
      level: 0.2
    start_pct: 0.65
    end_pct: 1.0
  metric_overrides: {}
- name: steady_grower
  label: Climbs steadily
  description: S-curve growth across the full window
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.5
      steepness: 6.0
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: slow_death
  label: Slowly fades
  description: Exponential decline across the full window
  curve_segments:
  - curve: exp_decay
    params:
      rate: 2.0
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: seasonal_spiker
  label: Pulses with the seasons
  description: Cyclical periodic peaks across the window
  curve_segments:
  - curve: oscillating
    params:
      period: 0.25
      amplitude: 0.4
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: zombie_account
  label: Present but inactive
  description: "Flat low level throughout \u2014 dormant account"
  curve_segments:
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: expansion_champion
  label: Keeps accelerating
  description: Compound growth with increasing velocity
  curve_segments:
  - curve: compound
    params:
      base_rate: 0.05
      acceleration: 0.02
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides:
    mrr:
      distribution: lognorm
      params:
        s: 0.6
        scale: 2500.0
entities:
- name: acme_corp_cohort
  archetype: rocket_then_cliff
  size: 50
  overrides: {}
  cross_dim_fks: {}
- name: globex_cohort
  archetype: steady_grower
  size: 30
  overrides: {}
  cross_dim_fks: {}
- name: hooli_cohort
  archetype: zombie_account
  size: 10
  overrides: {}
  cross_dim_fks: {}
