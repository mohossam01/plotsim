correlations:
- metric_a: engagement
  metric_b: mrr
  coefficient: 0.72
- metric_a: engagement
  metric_b: churn_risk
  coefficient: -0.55
- metric_a: support_tickets
  metric_b: churn_risk
  coefficient: 0.55
noise:
  gaussian_sigma: 0.05
  outlier_rate: 0.02
  mcar_rate: 0.01
output:
  format: csv
  directory: out/saas
stages:
  field: churn_risk
  sequence:
  - name: onboarding
    threshold_enter: 0.0
    threshold_exit: 0.2
  - name: active
    threshold_enter: 0.2
    threshold_exit: 0.5
  - name: at_risk
    threshold_enter: 0.5
    threshold_exit: 0.8
  - name: churned
    threshold_enter: 0.8
    threshold_exit: null
  enforce_order: true
  downgrade_delay: null
locale: en_US
