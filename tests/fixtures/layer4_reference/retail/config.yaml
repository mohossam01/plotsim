domain:
  name: Retail customer segments
  description: "Shopping behavior across customer segments \u2014 sessions, purchases,\
    \ loyalty, returns"
  entity_type: customer_segment
  entity_label: Customer segments
time_window:
  start: 2023-01
  end: 2024-12
  granularity: monthly
seed: 7
metrics:
- name: session_count
  label: Monthly sessions per segment
  distribution: poisson
  params:
    lambda: 8.0
  polarity: positive
  value_range: null
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: cart_value
  label: Average cart value
  distribution: lognorm
  params:
    s: 0.6
    loc: 0.0
    scale: 80.0
  polarity: positive
  value_range:
    min: 0.0
    max: 10000.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: conversion_rate
  label: Session-to-purchase conversion
  distribution: beta
  params:
    alpha: 2.0
    beta: 8.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: return_rate
  label: Purchase return rate
  distribution: beta
  params:
    alpha: 1.5
    beta: 10.0
  polarity: negative
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: loyalty_score
  label: Segment loyalty index
  distribution: beta
  params:
    alpha: 3.0
    beta: 4.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: repeat_purchase_rate
  label: Repeat-purchase rate
  distribution: beta
  params:
    alpha: 2.0
    beta: 6.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag:
    driver: loyalty_score
    lag_periods: 1
    blend_weight: 1.0
    decay: false
    decay_window: null
    decay_kernel: geometric
  seasonal_sensitivity: 1.0
archetypes:
- name: holiday_surge
  label: Spikes around holidays
  description: Cyclical seasonal demand
  curve_segments:
  - curve: oscillating
    params:
      period: 0.5
      amplitude: 0.35
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: steady_growth
  label: Builds loyalty over time
  description: Sigmoid growth to a sustained plateau
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.5
      steepness: 5.0
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: one_and_done
  label: Shops once, then fades
  description: Rapid rise, abrupt drop, then dormant
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.2
      steepness: 12.0
    start_pct: 0.0
    end_pct: 0.35
  - curve: step
    params:
      threshold: 0.5
      before: 1.0
      after: 0.15
    start_pct: 0.35
    end_pct: 0.5
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.5
    end_pct: 1.0
  metric_overrides: {}
- name: bargain_hunter
  label: Sale-driven, lower basket size
  description: Cyclical buying tied to discount cycles, smaller carts
  curve_segments:
  - curve: oscillating
    params:
      period: 0.25
      amplitude: 0.4
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides:
    cart_value:
      distribution: lognorm
      params:
        s: 0.6
        loc: 0.0
        scale: 40.0
      value_range: null
entities:
- name: power_buyers
  archetype: steady_growth
  size: 25
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: holiday_shoppers
  archetype: holiday_surge
  size: 30
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: browsers
  archetype: one_and_done
  size: 15
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: deal_seekers
  archetype: bargain_hunter
  size: 20
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
