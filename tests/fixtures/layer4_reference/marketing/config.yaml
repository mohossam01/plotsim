domain:
  name: Marketing analytics warehouse
  description: Acquisition, engagement, conversion, and revenue across customer segments
    and channels
  entity_type: customer_segment
  entity_label: Customer segments
time_window:
  start: 2023-01
  end: 2024-12
  granularity: monthly
seed: 31
metrics:
- name: sessions
  label: Monthly site sessions
  distribution: poisson
  params:
    lambda: 12.0
  polarity: positive
  value_range: null
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: bounce_rate
  label: Session bounce rate
  distribution: beta
  params:
    alpha: 2.0
    beta: 5.0
  polarity: negative
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: conversion_rate
  label: Visit-to-purchase conversion
  distribution: beta
  params:
    alpha: 2.0
    beta: 8.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: ad_spend
  label: Monthly paid-media spend
  distribution: lognorm
  params:
    s: 0.7
    loc: 0.0
    scale: 2000.0
  polarity: positive
  value_range:
    min: 0.0
    max: 50000.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: impressions
  label: Ad impressions delivered
  distribution: poisson
  params:
    lambda: 500.0
  polarity: positive
  value_range: null
  causal_lag:
    driver: ad_spend
    lag_periods: 1
    blend_weight: 1.0
    decay: false
    decay_window: null
    decay_kernel: geometric
  seasonal_sensitivity: 1.0
- name: click_through_rate
  label: Ad click-through rate
  distribution: beta
  params:
    alpha: 2.5
    beta: 12.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: revenue
  label: Monthly revenue per segment
  distribution: lognorm
  params:
    s: 0.8
    loc: 0.0
    scale: 5000.0
  polarity: positive
  value_range:
    min: 0.0
    max: 200000.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: average_order_value
  label: Average order value
  distribution: lognorm
  params:
    s: 0.5
    loc: 0.0
    scale: 85.0
  polarity: positive
  value_range:
    min: 0.0
    max: 5000.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: customer_lifetime_value
  label: Customer lifetime value
  distribution: lognorm
  params:
    s: 0.9
    loc: 0.0
    scale: 800.0
  polarity: positive
  value_range:
    min: 0.0
    max: 50000.0
  causal_lag: null
  seasonal_sensitivity: 1.0
archetypes:
- name: high_value_loyal
  label: Compounding high-value loyalists
  description: Compound revenue growth, premium basket
  curve_segments:
  - curve: compound
    params:
      base_rate: 0.06
      acceleration: 0.02
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides:
    revenue:
      distribution: lognorm
      params:
        s: 0.5
        loc: 0.0
        scale: 8000.0
      value_range: null
- name: deal_seeker
  label: Promo-driven shoppers
  description: Cyclical engagement tied to discount cycles
  curve_segments:
  - curve: oscillating
    params:
      period: 0.25
      amplitude: 0.4
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: organic_convert
  label: Organic discovery converters
  description: S-curve adoption from organic traffic
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.6
      steepness: 5.0
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: paid_acquisition_churn
  label: Paid spike then churn
  description: Sharp paid-acquisition rise, abrupt drop, dormant tail
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.2
      steepness: 10.0
    start_pct: 0.0
    end_pct: 0.4
  - curve: step
    params:
      threshold: 0.5
      before: 1.0
      after: 0.15
    start_pct: 0.4
    end_pct: 0.5
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.5
    end_pct: 1.0
  metric_overrides: {}
- name: dormant_reactivation
  label: Win-back reactivators
  description: Long dormant plateau, late re-engagement bump
  curve_segments:
  - curve: plateau
    params:
      level: 0.15
    start_pct: 0.0
    end_pct: 0.55
  - curve: step
    params:
      threshold: 0.5
      before: 0.15
      after: 0.65
    start_pct: 0.55
    end_pct: 0.65
  - curve: plateau
    params:
      level: 0.65
    start_pct: 0.65
    end_pct: 1.0
  metric_overrides: {}
entities:
- name: power_buyers
  archetype: high_value_loyal
  size: 20
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: promo_shoppers
  archetype: deal_seeker
  size: 30
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: organic_discoverers
  archetype: organic_convert
  size: 25
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: ad_acquired
  archetype: paid_acquisition_churn
  size: 15
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
- name: win_backs
  archetype: dormant_reactivation
  size: 10
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
  start_period: 0
  treatment_group: null
  treatment_lift_log_odds: null
  treatment_start_period: 0
