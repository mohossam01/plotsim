correlations:
- metric_a: engagement_index
  metric_b: attrition_risk
  coefficient: -0.72
- metric_a: performance_score
  metric_b: attrition_risk
  coefficient: -0.55
- metric_a: absence_rate
  metric_b: attrition_risk
  coefficient: 0.61
noise:
  gaussian_sigma: 0.04
  outlier_rate: 0.015
  mcar_rate: 0.01
output:
  format: csv
  directory: out/hr
manifest:
  include: true
  trajectory_sample_rate: 1.0
stages:
  field: attrition_risk
  sequence:
  - name: new_hire
    threshold_enter: 0.0
    threshold_exit: 0.15
  - name: established
    threshold_enter: 0.15
    threshold_exit: 0.4
  - name: disengaging
    threshold_enter: 0.4
    threshold_exit: 0.7
  - name: exited
    threshold_enter: 0.7
    threshold_exit: null
  enforce_order: true
  downgrade_delay: null
