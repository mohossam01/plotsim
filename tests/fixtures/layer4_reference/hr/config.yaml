domain:
  name: HR talent analytics
  description: Employee performance and attrition patterns across tenure
  entity_type: employee
  entity_label: Employees
time_window:
  start: 2022-01
  end: 2024-12
  granularity: monthly
seed: 17
metrics:
- name: performance_score
  label: Performance score
  distribution: normal
  params:
    mu: 3.5
    sigma: 0.6
  polarity: positive
  value_range:
    min: 1.0
    max: 5.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: engagement_index
  label: Engagement index
  distribution: beta
  params:
    alpha: 3.0
    beta: 3.0
  polarity: positive
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: training_hours
  label: Monthly training hours
  distribution: gamma
  params:
    shape: 2.0
    scale: 3.0
  polarity: positive
  value_range: null
  causal_lag: null
  seasonal_sensitivity: 1.0
- name: absence_rate
  label: Monthly absence rate
  distribution: beta
  params:
    alpha: 1.2
    beta: 8.0
  polarity: negative
  value_range:
    min: 0.0
    max: 1.0
  causal_lag:
    driver: engagement_index
    lag_periods: 1
    blend_weight: 1.0
  seasonal_sensitivity: 1.0
- name: attrition_risk
  label: Attrition risk score
  distribution: beta
  params:
    alpha: 2.0
    beta: 6.0
  polarity: negative
  value_range:
    min: 0.0
    max: 1.0
  causal_lag: null
  seasonal_sensitivity: 1.0
archetypes:
- name: fast_riser
  label: Rapid growth
  description: Compound growth in performance over tenure
  curve_segments:
  - curve: compound
    params:
      base_rate: 0.08
      acceleration: 0.03
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: steady_performer
  label: Consistent high performance
  description: Sustained high plateau throughout tenure
  curve_segments:
  - curve: plateau
    params:
      level: 0.8
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: quiet_quitter
  label: Gradually disengages
  description: Exponential decline across the window
  curve_segments:
  - curve: exp_decay
    params:
      rate: 1.5
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
- name: burnout_risk
  label: Peaks then crashes
  description: Rapid rise, sharp fall, recovery plateau
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.25
      steepness: 8.0
    start_pct: 0.0
    end_pct: 0.5
  - curve: step
    params:
      threshold: 0.5
      before: 1.0
      after: 0.3
    start_pct: 0.5
    end_pct: 0.6
  - curve: plateau
    params:
      level: 0.3
    start_pct: 0.6
    end_pct: 1.0
  metric_overrides: {}
- name: new_hire_ramp
  label: Starts low then ramps up
  description: Low initial performance, sigmoid rise to plateau
  curve_segments:
  - curve: sigmoid
    params:
      midpoint: 0.4
      steepness: 7.0
    start_pct: 0.0
    end_pct: 1.0
  metric_overrides: {}
entities:
- name: high_flyers
  archetype: fast_riser
  size: 20
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
- name: core_team
  archetype: steady_performer
  size: 50
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
- name: disengaged_pool
  archetype: quiet_quitter
  size: 10
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
- name: burnout_cohort
  archetype: burnout_risk
  size: 5
  overrides: null
  cross_dim_fks: {}
  seasonal_sensitivity: 1.0
