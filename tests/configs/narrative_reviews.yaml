# ═══════════════════════════════════════════════════════
#  plotsim — Customer reviews (narrative-text demo)
# ═══════════════════════════════════════════════════════
#
#  Showcase template for ``NarrativeSource`` columns:
#
#    * ``fct_reviews.review_text`` is a trajectory- and
#      archetype-driven sentence generated by sampling slot
#      phrases from a per-archetype lexicon. Each cell is a
#      deterministic function of (trajectory position,
#      archetype, RNG state) — same seed → byte-identical text.
#    * Three segments (``promoters``, ``neutrals``,
#      ``detractors``) ride three archetypes (growth / flat /
#      decline). The bands carry a **universal sentiment
#      gradient**: low = negative language, mid = neutral
#      language, high = positive language — consistent across
#      all three archetypes. A growth entity's text becomes
#      more positive as the trajectory rises; a decline
#      entity's text becomes more negative.
#    * Each slot is an independent aspect:
#        - ``opener``  → experience aspect (archetype-distinct
#                        phrasing style: promoters speak in
#                        first-person emotional voice, neutrals
#                        in measured observational voice,
#                        detractors in terse blunt voice).
#        - ``object``  → product/feature aspect (sentiment
#                        vocabulary shared across archetypes).
#        - ``comment`` → judgment/recommendation aspect
#                        (sentiment vocabulary shared across
#                        archetypes).
#      Aspect-level sentiment is recoverable per slot — the
#      template unlocks Aspect-Based Sentiment Analysis on top
#      of overall sentiment classification.
#
#  Domain narrative: 60 customers leave one review per month
#  for two years, producing 1,440 review rows. Engagement
#  trajectory drives the band (and therefore sentiment); the
#  archetype's opener vocabulary plus the band-driven
#  object/comment vocabulary together carry the signal a
#  classifier learns. A bag-of-words classifier predicts the
#  segment above chance — the shipping target is ≥ 0.45
#  accuracy on a held-out entity split (chance is 1/3 for
#  three segments).
#
#  Run: ``plotsim run narrative_reviews`` produces normalized
#  CSVs. ``fct_reviews`` carries the trajectory metric plus
#  the narrative text column; join on ``customer_id`` to
#  attach the customer name from ``dim_customer``.

about: "Customer product reviews — narrative text demo"
unit: customer

seed: 2026

window:
  start: 2024-01
  end: 2025-12
  every: monthly


# ── what we measure ─────────────────────────────────────

metrics:

  - name: engagement
    label: "Customer engagement score"
    type: score
    polarity: positive


# ── who we're simulating ────────────────────────────────

segments:

  - name: promoters
    count: 20
    archetype: growth
    label: "Promoters — engagement rises over the window"

  - name: neutrals
    count: 20
    archetype: flat
    label: "Neutrals — engagement holds flat"

  - name: detractors
    count: 20
    archetype: decline
    label: "Detractors — engagement falls over the window"


# ── schema ──────────────────────────────────────────────

dimensions:

  - name: dim_date
    per: period
    columns:
      - name: date_key
        type: id
      - name: date
        type: date
      - name: year
        type: int
      - name: month
        type: int
      - name: quarter
        type: int

  - name: dim_customer
    per: unit
    columns:
      - name: customer_id
        type: id
      - name: customer_name
        type: faker.name


facts:

  - name: fct_reviews
    metrics: [engagement]
    columns:
      - name: review_id
        type: id
      - name: customer_id
        type: ref.dim_customer
      - name: date_key
        type: ref.dim_date
      - name: engagement_score
        type: metric.engagement
      - name: review_text
        type: narrative
        template: "{opener} {object}. {comment}"
        # Lexicon keys are the engine archetype names — in the
        # builder API these equal the segment names above
        # (``promoters`` / ``neutrals`` / ``detractors``), NOT the
        # recipe keywords (``growth`` / ``flat`` / ``decline``)
        # passed in each segment's ``archetype:`` field.
        #
        # Design: bands carry a universal sentiment gradient
        # (low=negative / mid=neutral / high=positive) across
        # ALL archetypes. The ``opener`` slot is the only
        # archetype-distinct surface — its phrasing style
        # encodes the segment identity. ``object`` and
        # ``comment`` slots share sentiment vocabulary across
        # archetypes; the band, not the archetype, picks the
        # phrase pool. This split makes the lexicon usable for
        # both segment classification and per-aspect sentiment
        # analysis from the same generated text.
        lexicons:
          promoters:
            opener:
              low:
                - "I am disappointed by"
                - "I am frustrated with"
                - "I am unhappy with"
                - "I am underwhelmed by"
                - "I cannot get excited about"
                - "I keep getting let down by"
                - "I am giving up on"
                - "I find myself frustrated by"
                - "I am sour on"
                - "I am soured by"
                - "I cannot recommend"
                - "I am losing patience with"
                - "I have run into issues with"
                - "I keep finding bugs in"
                - "I am not satisfied with"
                - "I cannot get behind"
              mid:
