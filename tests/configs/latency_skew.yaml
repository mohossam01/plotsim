# ═══════════════════════════════════════════════════════
#  plotsim — API service latency monitoring
# ═══════════════════════════════════════════════════════
#
#  Showcase template for explicit per-metric distributions
#  (mission 0.6-M6). Every metric below pins its
#  ``distribution`` + ``distribution_params`` instead of
#  letting the interpreter auto-pick from ``type`` + ``range``.
#
#  Why each family:
#    gamma     — central-tendency latency (right-skewed, no
#                heavy upper tail). Common p50 shape.
#    weibull   — tail latency (shape > 1 → mode away from 0,
#                fatter right tail than gamma). Classic p99
#                / time-to-failure shape.
#    beta      — bounded rate (alpha=2, beta=25 → mean ≈ 0.07,
#                heavily skewed low). Pinning the shape directly
#                instead of relying on type=score's default
#                beta(2, 5).
#    normal    — bounded utilization where mean matters and
#                the Gaussian tails get clamped to [0, 1].
#    lognorm   — wide bandwidth distribution where most rows
#                are modest and a few are large. The default
#                amount auto-pick would pick this too, but
#                here we pin ``s`` instead of taking the
#                recipe value.
#    poisson   — discrete event count. Default for type=count
#                anyway, declared explicitly for symmetry.

about: "API service latency monitoring"
unit: service

# Pin determinism — same seed in, byte-identical CSVs out.
seed: 2026

window:
  start: 2024-01
  end: 2024-12
  every: monthly


# ── what we measure ─────────────────────────────────────

metrics:

  - name: p50_latency_ms
    label: Median request latency (ms)
    type: amount
    polarity: negative
    range: [10, 800]
    distribution: gamma
    distribution_params:
      shape: 4.0

  - name: p99_latency_ms
    label: 99th-percentile latency (ms)
    type: amount
    polarity: negative
    range: [50, 5000]
    distribution: weibull
    distribution_params:
      shape: 1.5

  - name: error_rate
    label: Request error rate
    type: score
    polarity: negative
    distribution: beta
    distribution_params:
      alpha: 2.0
      beta: 25.0

  - name: cpu_utilization
    label: CPU utilization
    type: score
    polarity: negative
    distribution: normal
    distribution_params:
      sigma: 0.08

  - name: bytes_per_request
    label: Bytes transferred per request
    type: amount
    polarity: positive
    range: [500, 500000]
    distribution: lognorm
    distribution_params:
      s: 0.85

  - name: incident_count
    label: Operational incidents per period
    type: count
    polarity: negative
    distribution: poisson


# ── who we're simulating ────────────────────────────────

segments:

  - name: hot_path
    count: 12
    archetype: growth
    label: "User-facing endpoints — load grows over the year"

  - name: batch_path
    count: 8
    archetype: spike_then_crash
    label: "Nightly batch jobs — periodic large spikes"

  - name: legacy_path
    count: 6
    archetype: decline > flat @ 6
    label: "Deprecated services — usage tapers, then idle"
