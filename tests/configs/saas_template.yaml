# ═══════════════════════════════════════════════════════
#  plotsim — B2B SaaS customer success
# ═══════════════════════════════════════════════════════

about: "B2B SaaS customer success"
unit: company

# Pin determinism — same seed in, byte-identical output every run.
seed: 1729

# Three builder dials defaulting to "do nothing". Set noise to a
# preset name for realistic jitter (`slightly_messy` / `realistic` /
# `dirty`) or use the dict form for full control. See
# docs/site/config-reference.md §noise / §output / §locale.
noise: perfectly_clean       # demo: also accepts `slightly_messy`, `realistic`, `dirty`
# locale: en_US              # str or list — threaded to faker.* columns

# 0.6-M15: opt-in denormalization (M14a). With ``denormalized: true``,
# each fact is left-joined with its FK'd dims and a paired
# ``<fct>_wide.csv`` is emitted alongside the normalized output. Lets
# students practice 1NF–3NF decomposition (DE L4) against a realistic
# SaaS subscription dataset; the normalized output stays available as
# the answer key.
output:
  denormalized: true

window:
  start: 2023-01
  end: 2024-12
  every: monthly


# ── Q4 holiday lift on customer-success metrics ────────────
#
#  Two effects compose: a Q4 lift (Nov-Dec) and a summer dip
#  (Jun-Aug). Per-metric `seasonal_sensitivity: 0.0` opts a
#  metric out (e.g. support_tickets, which doesn't ride
#  calendar peaks the same way).

seasonality:
  - { months: [11, 12], strength: 0.30 }
  - { months: [6, 7, 8], strength: -0.10 }


# ── what we measure ─────────────────────────────────────

metrics:

  - name: engagement
    label: Product engagement
    type: score
    polarity: positive

  - name: mrr
    label: Monthly recurring revenue
    type: amount
    polarity: positive
    range: [100, 50000]

  - name: support_tickets
    label: Support ticket volume
    type: count
    polarity: negative
    follows: engagement
    delay: 2

  - name: feature_adoption
    label: Feature adoption rate
    type: score
    polarity: positive

  - name: churn_risk
    label: Churn risk score
    type: score
    polarity: negative

  - name: nps
    label: Net promoter score
    type: index
    polarity: positive
    range: [-100, 100]


# ── how metrics connect ─────────────────────────────────

# `connections` accepts both the 9-word vocabulary AND any custom
# coefficient in [-1, 1]. The numeric form is for cases where you've
# calibrated the coefficient from a real dataset and want to pin it
# exactly rather than picking the closest word.
connections:
  - engagement driven_by mrr
  - engagement opposes churn_risk
  - support_tickets related churn_risk
  - "feature_adoption 0.42 mrr"          # custom coefficient (string)
  - [nps, 0.18, engagement]               # custom coefficient (tuple)


# ── who we're simulating ────────────────────────────────

segments:

  - name: promising_client
    count: 20
    archetype: growth > spike_then_crash > flat @ 8 @ 16
    label: "Strong start, lost champion at month 8, went dormant by 16"
    attributes:
      industry: [Technology, Finance, Healthcare]
      region: [US, EMEA]
      tier: enterprise
    baseline:
      mrr: high
      engagement: high
      support_tickets: low

  - name: steady_enterprise
    count: 25
    archetype: growth
    label: "Reliable accounts, steady climb"
    attributes:
      industry: [Technology, Finance]
      region: [US, APAC]
      tier: enterprise
    baseline:
      mrr: high
      engagement: high
      support_tickets: low

  - name: slow_churn
    count: 15
    archetype: flat > decline @ 12
    label: "Coasted for a year, then quietly faded"
    attributes:
      industry: [Media, Hospitality]
      region: [EMEA]
      tier: starter
    baseline:
      mrr: low
      engagement: low
      support_tickets: high

  - name: seasonal_accounts
    count: 15
    archetype: growth > seasonal @ 6
    label: "Ramped up first 6 months, then settled into quarterly cycles"
    attributes:
      industry: [Retail, Manufacturing]
      region: [US]
      tier: growth
    baseline:
      mrr: mid
      engagement: mid
      support_tickets: mid

  - name: dormant
    count: 10
    archetype: flat
    label: "Signed up, never activated"
    attributes:
      industry: [Education]
      region: [APAC]
      tier: starter
    baseline:
      mrr: low
      engagement: low
      support_tickets: low

  - name: turnaround
    count: 10
    archetype: decline > flat > growth @ 6 @ 14
    label: "Declining, hit bottom at month 6, new leadership turned it around at 14"
    attributes:
      industry: [Finance, Healthcare]
      region: [US]
      tier: growth
    baseline:
      mrr: mid
      engagement: mid
      support_tickets: mid


# ── lifecycle funnel ────────────────────────────────────

lifecycle:
  track: churn_risk
  stages:
    - onboarding: 0.0
    - active: 0.2
    - at_risk: 0.5
    - churned: 0.8


# ── schema ──────────────────────────────────────────────

dimensions:

  - name: dim_date
    per: period
    columns:
      - {name: date_key,  type: id}
      - {name: date,      type: date}
      - {name: year,      type: int}
      - {name: month,     type: int}
      - {name: quarter,   type: int}

  - name: dim_company
    per: unit
    columns:
      - {name: company_id,    type: id}
      - {name: company_name,  type: faker.company}
      - {name: industry,      type: faker.industry}
      - {name: founded_year,  type: faker.year}
      - {name: cohort_size,   type: segment.count}
      - name: plan_tier
        type: scd
        tracks: mrr
        tiers: [starter, growth, enterprise]
        at: [0.4, 0.7]

  - name: dim_user
    per: unit
    columns:
      - {name: user_id,     type: id}
      - {name: company_id,  type: ref.dim_company}
      - {name: user_name,   type: faker.name}
      - {name: role,        type: static.member}

  - name: dim_plan
    reference: true
    columns:
      - {name: plan_id,       type: id}
      - {name: plan_name,     type: static.starter}
      - {name: monthly_price, type: static.99.00}

facts:

  - name: fct_engagement
    metrics: [engagement, feature_adoption]
    columns:
      - {name: date_key,           type: ref.dim_date}
      - {name: company_id,         type: ref.dim_company}
      - {name: engagement_score,   type: metric.engagement}
      - {name: feature_adoption,   type: metric.feature_adoption}
      - name: customer_sentiment
        type: bucket
        labels: [at_risk, lukewarm, satisfied, delighted]

  - name: fct_revenue
    metrics: [mrr]
    columns:
      - {name: date_key,    type: ref.dim_date}
      - {name: company_id,  type: ref.dim_company}
      - {name: plan_id,     type: ref.dim_plan}
      - {name: mrr,         type: metric.mrr}

  - name: fct_support_tickets
    metrics: [support_tickets, churn_risk, nps]
    columns:
      - {name: date_key,      type: ref.dim_date}
      - {name: company_id,    type: ref.dim_company}
      - {name: ticket_count,  type: metric.support_tickets}
      - {name: churn_risk,    type: metric.churn_risk}
      - {name: nps,           type: metric.nps}

events:

  - name: evt_login
    trigger: proportional
    driver: engagement
    scale: 5
    # 0.6-M15: log-file writer (M14b) demonstrated on the login event
    # stream. Each row is rendered into a structured log line; the
    # ``.log`` file is emitted alongside the CSV / Parquet output. The
    # format is a syslog-flavoured template — students parse it with
    # regex / grok / line splitters and reconcile against the
    # event-table CSV for ground truth (DE L33).
    log_format: "{event_ts} INFO user={user_id} company={company_id} action=login"
    log_filename: "evt_login.log"
    columns:
      - {name: event_id,    type: id}
      - {name: date_key,    type: ref.dim_date}
      - {name: user_id,     type: ref.dim_user}
      - {name: company_id,  type: ref.dim_company}
      - {name: event_ts,    type: timestamp}

  - name: evt_churn
    trigger: threshold
    metric: churn_risk
    above: 0.7
    for: 3
    columns:
      - {name: event_id,      type: id}
      - {name: date_key,      type: ref.dim_date}
      - {name: company_id,    type: ref.dim_company}
      - {name: churn_reason,  type: faker.sentence}
      - {name: churn_flag,    type: flag}


# 0.6-M15: data-quality issues for Data Quality Testing (DE L25) and
# Data Cleaning (DE L15). Manifest records every injection so students
# can score detectors against ground truth. Issue placement is on
# event tables here (not facts) because the streaming-parquet writer
# (M121b) operates per fact-table row group and tests assert in-memory
# / on-disk fact frames equal cell-for-cell — quality injections
# applied during write would surface that as a regression. Events
# go through the standard single-shot writer where in-memory and
# on-disk reconcile under quality injection.
quality:
  - { table: evt_churn, issue: null_injection, rate: 0.05, column: churn_reason }
  - { table: evt_login, issue: duplicate_rows, rate: 0.02 }


# ═══════════════════════════════════════════════════════
#  Legend
# ═══════════════════════════════════════════════════════
#
#  ── unit ───────────────────────────────────────────────
#    company             SaaS / B2B
#    employee            HR / workforce
#    customer            retail / e-commerce
#    campaign            marketing
#    (any word)          dim table becomes dim_{unit}
#
#  ── every ──────────────────────────────────────────────
#    monthly             calendar months
#    weekly              calendar weeks
#    daily               calendar days
#
#  ── metric type ────────────────────────────────────────
#    score               bounded [0,1] — engagement, adoption, risk
#    amount              bounded business range (requires range)
#    count               integer event counts — tickets, logins
#    index               signed centered metric (requires range)
#
#  ── polarity ───────────────────────────────────────────
#    positive            higher is better
#    negative            higher is worse
#
#  ── archetype patterns ─────────────────────────────────
#    growth              smooth S-curve rise
#    decline             exponential fade
#    seasonal            2 oscillation cycles
#    flat                low and constant
#    spike_then_crash    rapid rise, drop, low plateau
#    accelerating        compound growth
#
#  ── archetype composition ──────────────────────────────
#    pattern > pattern   sequential — first then second
#    @ N                 transition at period N
#    growth > decline @ 12
#    decline > flat > growth @ 6 @ 14
#
#  ── connections ────────────────────────────────────────
#    mirrors             +0.75  nearly the same signal
#    driven_by           +0.55  strong positive link
#    related             +0.40  moderate positive
#    hints_at            +0.20  weak positive
#    independent          0.00  no relationship
#    hints_against       -0.20  weak inverse
#    resists             -0.40  moderate inverse
#    opposes             -0.55  strong inverse
#    inverts             -0.75  nearly mirror-opposite
#
#  ── baseline ───────────────────────────────────────────
#    high                upper third of metric range
#    mid                 midpoint (default if omitted)
#    low                 lower third of metric range
#
#  ── follows + delay ────────────────────────────────────
#    follows: metric     this metric lags behind another
#    delay: N            by N periods
#
#  ── range ──────────────────────────────────────────────
#    [min, max]          required for amount and index
#                        score defaults to [0, 1]
#                        count has no range
#
#  ── count ──────────────────────────────────────────────
#    1 – 5000            records per segment
#
#  ── schema types ───────────────────────────────────────
#    id                  primary key, auto-generated
#    ref.{table}         foreign key to dim table
#    metric.{name}       populated from named metric
#    faker.{type}        generated via faker (company, name, etc)
#    static.{value}      fixed value for all rows
#    segment.count       entity group size
#    timestamp           generated datetime within period
#    flag                boolean derived from event trigger
#    bucket              categorical label derived from trajectory
#    scd                 slowly changing dimension (requires tracks/tiers/at)
#
#  ── event triggers ─────────────────────────────────────
#    proportional        row count = driver metric × scale per period
#    threshold           fires once when metric crosses value for N periods
#
#  ── dimension per ──────────────────────────────────────
#    period              one row per time period (dim_date)
#    unit                one row per entity (dim_company, dim_employee)
#    reference: true     static lookup (dim_plan)
