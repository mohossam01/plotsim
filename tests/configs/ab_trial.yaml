# ═══════════════════════════════════════════════════════
#  plotsim — SaaS trial → conversion A/B test
# ═══════════════════════════════════════════════════════
#
#  Showcase template for the full M8 feature set:
#
#    * Cold-start entities (mission 0.6-M8a) — segments declare
#      explicit ``Entity.start_period`` via the arrival distribution
#      below. Late-arriving cohorts have NaN-filled trajectory
#      prefix and zero fact rows pre-arrival.
#    * Segment proportion drift (mission 0.6-M8b) — the
#      ``arrival`` field on each segment shapes how the cohort
#      arrives across the time window. Different shapes per
#      segment model heterogeneous acquisition channels.
#    * Treatment / control (mission 0.6-M8c) — half of the
#      ``trial_users`` segment is randomly assigned to a
#      "new_onboarding" treatment that lifts engagement by
#      0.6 log-odds (~ +14% effective position) starting at
#      period 6 (the rollout date).
#
#  Domain narrative: a SaaS company runs a rollout experiment.
#  Existing customers ("legacy") are present from period 0 and
#  receive no treatment. New trial users arrive across the year
#  via two channels: an organic ramp (linear, back-loaded) and
#  a paid-ad pulse (step at periods 0 and 6). At period 6 the
#  product team rolls out a redesigned onboarding flow to half
#  of the trial users; the other half stay on the original.
#  Engagement lift is statistically recoverable from the
#  generated data via difference-in-means on the trial cohort
#  post period 6.
#
#  Run: ``plotsim run ab_trial`` produces normalized CSVs +
#  ``manifest.json`` with the per-entity treatment label and
#  per-cohort lift in ``treatment_cohorts``.

about: "SaaS trial-conversion A/B test (cold-start + drift + treatment)"
unit: customer

seed: 2026

window:
  start: 2024-01
  end: 2024-12
  every: monthly


# ── what we measure ─────────────────────────────────────

metrics:

  - name: engagement
    label: "Engagement score (DAU/MAU proxy)"
    type: score
    polarity: positive

  - name: trial_minutes
    label: "Minutes spent in product per period"
    type: amount
    polarity: positive
    range: [0, 600]

  - name: feature_adoption
    label: "Feature-adoption rate"
    type: score
    polarity: positive

  - name: support_tickets
    label: "Support tickets opened per period"
    type: count
    polarity: negative


# ── who we're simulating ────────────────────────────────

segments:

  # Existing customers — on-platform from period 0, no
  # arrival distribution, no treatment. Provides the baseline
  # cohort that pre-dates the experiment.
  - name: legacy
    count: 30
    archetype: flat
    label: "Existing customers (no experiment exposure)"

  # Organic trial signups — a back-loaded linear arrival
  # (more signups in later periods as marketing builds
  # momentum). Half receive the new onboarding flow at
  # period 6; the other half stay on the original.
  - name: trial_organic
    count: 60
    archetype: growth
    label: "Organic trial signups"
    arrival:
      kind: linear
      start: 0
      end: 10
      direction: increasing
    treatment:
      fraction: 0.5
      lift_log_odds: 0.6
      start_period: 6
      treatment_label: "new_onboarding"
      control_label: "original_onboarding"

  # Paid-ad trial signups — a two-block step shape: half
  # arrive immediately at period 0 (launch ad burst), half
  # arrive at period 6 (mid-year campaign refresh). Same
  # 50/50 treatment split as organic so the two channels
  # are comparable post-rollout.
  - name: trial_paid
    count: 40
    archetype: growth
    label: "Paid-acquisition trial signups"
    arrival:
      kind: step
      blocks:
        - period: 0
          fraction: 0.5
        - period: 6
          fraction: 0.5
    treatment:
      fraction: 0.5
      lift_log_odds: 0.6
      start_period: 6
      treatment_label: "new_onboarding"
      control_label: "original_onboarding"
