[project]
name = "plotsim"
version = "0.2.0"
description = "Generate realistic multi-table datasets from behavioral archetypes. No real data needed."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
    { name = "Mohamed Hossam" }
]
keywords = [
    "synthetic-data", "data-generation", "analytics",
    "dbt", "portfolio", "simulation", "archetypes"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "Intended Audience :: Science/Research",
    "Topic :: Software Development :: Testing :: Traffic Generation",
    "Topic :: Database",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "pandas>=2.0",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "faker>=18.0",
]

[project.optional-dependencies]
ui = [
    "streamlit>=1.36",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1.0",
    "build>=1.0",
    "twine>=4.0",
]

[project.scripts]
plotsim = "plotsim.cli:main"

[project.urls]
Homepage = "https://github.com/mohossam-ae/plotsim"
Documentation = "https://github.com/mohossam-ae/plotsim#readme"
Repository = "https://github.com/mohossam-ae/plotsim"
Issues = "https://github.com/mohossam-ae/plotsim/issues"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["plotsim*"]

[tool.setuptools.package-data]
plotsim = ["configs/*.yaml", "py.typed"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration: end-to-end tests (slow)"]

