site_name: plotsim
site_description: Generate multi-table synthetic datasets with behavioral trajectories, correlations, and causal lags. Config-driven, deterministic, no real data required.
site_url: https://mohossam01.github.io/plotsim/
site_author: Mohamed Hossam

repo_name: mohossam01/plotsim
repo_url: https://github.com/mohossam01/plotsim
edit_uri: edit/main/docs/

copyright: Apache-2.0 licensed.

docs_dir: docs/site

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  custom_dir: docs/site/overrides
  language: en
  logo: assets/brand/favicon.svg
  favicon: assets/brand/favicon-32.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/brand/tokens.css
  - assets/brand/palette.css

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - User guide:
      - How it works: user-guide/how-it-works.md
      - Archetypes: user-guide/archetypes.md
      - Metrics & connections: user-guide/metrics-and-connections.md
      - Seasonality: user-guide/seasonality.md
      - Experiments & cohorts: user-guide/experiments-and-cohorts.md
      - Schema guide: user-guide/schema-guide.md
      - Geo hierarchy: user-guide/geo-hierarchy.md
      - Multi-source overlap: user-guide/multi-source.md
      - CDC fact-side: user-guide/cdc-facts.md
      - Narrative text: user-guide/narrative-source.md
      - Output formats: user-guide/output-formats.md
  - Tutorials:
      - Getting started: tutorial-notebooks/getting_started.ipynb
      - Feature surfaces:
          - Designing archetypes: tutorial-notebooks/designing_archetypes.ipynb
          - Seasonality & correlations: tutorial-notebooks/seasonality_and_correlations.ipynb
          - Schema & dimensions: tutorial-notebooks/schema_and_dimensions.ipynb
          - Bridges & advanced: tutorial-notebooks/bridges_and_advanced.ipynb
          - Data quality: tutorial-notebooks/data_quality.ipynb
      - Workflows:
          - Pipeline testing: tutorial-notebooks/pipeline_testing.ipynb
          - ML readiness: tutorial-notebooks/ml_readiness.ipynb
      - Use cases:
          - Data engineer recipes: tutorial-notebooks/de_use_cases.ipynb
          - Data scientist recipes: tutorial-notebooks/ds_use_cases.ipynb
  - Cookbook:
      - For data engineers: cookbook/data-engineering.md
      - For data scientists: cookbook/data-science.md
  - Reference:
      - Feature catalog: feature-reference.md
      - API: api-reference.md
      - CLI: cli-reference.md
      - Config fields: config-reference.md
      - Column types: column-types.md
      - Manifest: manifest-reference.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.smartsymbols

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mohossam01/plotsim
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/plotsim/
