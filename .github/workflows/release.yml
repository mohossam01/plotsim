# Cut a release: validate the prep work, tag, and create a GitHub Release.
#
# This workflow is the contract that turns "version bumped + CHANGELOG
# section dated" on main into a published release. The actual upload to
# PyPI happens in publish.yml, which fires on the tag push this workflow
# performs and pauses at the `pypi` environment for a required reviewer.
#
# Inputs:
#   version  X.Y.Z (no `v` prefix). Must already be present in
#            plotsim/__init__.py, pyproject.toml, and CHANGELOG.md.
#
# Trigger from the Actions tab (Release → Run workflow), or:
#   gh workflow run release.yml -f version=0.6.1
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z, no v prefix)'
        required: true
        type: string

permissions:
  contents: write  # tag push + GitHub Release creation

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Read input via env to avoid shell injection from workflow_dispatch.
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # full history + tags for ls-remote and annotated tag

      - name: Validate version format (X.Y.Z, digits and dots only)
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not in X.Y.Z format (digits and dots only)."
            exit 1
          fi

      - name: Validate plotsim/__init__.py version line
        run: |
          # Expected exact line: __version__ = "X.Y.Z"
          if ! grep -qxF "__version__ = \"$VERSION\"" plotsim/__init__.py; then
            echo "::error::plotsim/__init__.py does not contain: __version__ = \"$VERSION\""
            echo "Found:"
            grep -n '^__version__' plotsim/__init__.py || true
            exit 1
          fi

      - name: Validate pyproject.toml version line
        run: |
          # Expected exact line in [project]: version = "X.Y.Z"
          if ! grep -qxF "version = \"$VERSION\"" pyproject.toml; then
            echo "::error::pyproject.toml does not contain: version = \"$VERSION\""
            echo "Found:"
            grep -n '^version = ' pyproject.toml || true
            exit 1
          fi

      - name: Validate CHANGELOG.md entry exists and is dated
        run: |
          # Heading format: ## [X.Y.Z] — YYYY-MM-DD (em-dash U+2014, single
          # space each side). Match exactly to refuse undated drafts.
          if ! grep -qE "^## \[$VERSION\] — [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing dated section for $VERSION."
            echo "Expected: ## [$VERSION] — YYYY-MM-DD  (em-dash, not hyphen)"
            echo "Found these section headings:"
            grep -nE "^## \[" CHANGELOG.md | head -10 || true
            exit 1
          fi

      - name: Verify tag does not already exist (local + remote)
        run: |
          if git tag -l "v$VERSION" | grep -qx "v$VERSION"; then
            echo "::error::Tag v$VERSION already exists locally."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists on origin."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Capture lines between this version's heading and the next ## [
          # heading. Use substr() rather than a regex with bracket escapes:
          # gawk treats `\[` in a regex as a plain `[`, which silently turns
          # the anchor into a character class and matches nothing.
          awk -v ver="$VERSION" '
            BEGIN { vh = "## [" ver "]"; vh_len = length(vh) }
            substr($0, 1, vh_len) == vh { in_section=1; next }
            in_section && substr($0, 1, 4) == "## [" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Extracted release notes are empty for $VERSION."
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md
          echo "-------------------------"

      - name: Create and push annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release-notes.md
